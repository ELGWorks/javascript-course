<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8"/>
        <title>Coin Flip</title>
        <script src ="script.js"></script>
    </head>

    <body>
        <p>Hello World!</p>
        <button onclick="playGame('heads')">heads</button>
        <button onclick="playGame('tails')">tails</button>
        <button onclick="score.wins = 0; score.losses = 0;">reset score</button>

        <script>
            
            let result = '';

            let score = JSON.parse(localStorage.getItem('score')) || {
                wins: 0,
                losses: 0
            }

            function playGame(guess) {

                let randomNumber = Math.random();

                if (randomNumber > 0.5) {
                    result = 'heads';
                }
                else {
                    result = 'tails';
                }

                if (guess === result) {
                    score.wins += 1;
                    console.log(`Computer picked ${result}. You picked ${guess}. You win. Scores: ${score.wins} wins. ${score.losses} losses.`); 
                }
                else {
                    score.losses += 1;
                    console.log(`Computer picked ${result}. You picked ${guess}. You lose. Scores: ${score.wins} wins. ${score.losses} losses.`);
                }

                localStorage.setItem('score', JSON.stringify(score));
            }
            
        </script>

    </body>
</html>
