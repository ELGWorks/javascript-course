<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8"/>
        <title>Objects</title>
        <script src ="script.js"></script>
    </head>

    <body>
        <p>Hello World!</p>
    </body>
    <script>

        const product = {
            name: 'socks',
            price: 1090
        };
        console.log(product);
        console.log(product.name);
        console.log(product.price);

        product.name = 'cotton socks';
        console.log(product.name);

        product.newProperty = true;
        console.log(product);

        delete product.newProperty;
        console.log(product);
    </script>
</html>
