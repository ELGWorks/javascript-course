<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8"/>
        <title>Cart Quantity Updated</title>
        <script src ="script.js"></script>
    </head>

    <script>
        let cartQuantity = 0;

        function updateCartQuantity(value) {
        cartQuantity += value;
        console.log(cartQuantity);
        }
    </script>

    <body>
        <p>Cart Quantity</p>

        <button onclick="
        console.log(`Cart quantity: ${cartQuantity}`);
        ">Show Quantity</button>

        <button onclick="
        updateCartQuantity(-2);
        ">-2</button>

        <button onclick="
        updateCartQuantity(-1);
        ">-1</button>

        <button onclick="
        updateCartQuantity(1);
        ">Add to Cart</button>

        <button onclick="
        updateCartQuantity(2);
        ">+2</button>

        <button onclick="
        updateCartQuantity(3);
        ">+3</button>

        <button onclick="
        updateCartQuantity(4);
        ">+4</button>

        <button onclick="
        updateCartQuantity(5);
        ">+5</button>

        <button onclick="
        updateCartQuantity(-1);
        ">Remove from cart</button>

        <button onclick="
        cartQuantity = 0;
        console.log(`Cart was reset`);
        console.log(`Cart quantity: ${cartQuantity}`);
        ">Reset Cart</button>
    </body>
</html>
