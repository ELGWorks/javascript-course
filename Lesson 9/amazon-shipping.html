<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8"/>
        <title>Amazon</title>
        <script src ="script.js"></script>
    </head>

    <body>

        <p>Amazon Shipping Calculator</p>
        <p>Orders under $40 = +$10 shipping.</p>
        <p>Orders over $40 = FREE shipping.</p>
        <input placeholder="Cost of order" class="js-input"  onkeydown="handleCostKeydown(event);">
        <button onclick="calculateCost();">Calculate</button>
        <p class="totalCost"></p>


        <script>
            // console.log(String(25));
            // console.log('25' - 5);
            // console.log('25' + 5);

            // window.document
            // window.console
            // window.alert
            // window.
            
           
            function handleCostKeydown(event) {
                if (event.key === 'Enter') {
                calculateCost();
                }
            }

            function calculateCost() {
                const inputElement = document.querySelector('.js-input');
                let cost = Number(inputElement.value);

                if (cost < 40) {
                    cost = cost + 10;
                }

                document.querySelector('.totalCost').innerHTML = `$${cost}`;
            }

        </script>

    </body>
</html>
