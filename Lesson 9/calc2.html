<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8"/>
        <title>Calculator</title>
        <style>
            .output {
            min-height: 30px;
            }
        </style>
    </head>

    <body>

        <p class="output"></p>

        <p>
        <button onclick="
        updateCalculation('1')
        ">1</button>

        <button onclick="
        updateCalculation('2')
        ">2</button>

        <button onclick="
        updateCalculation('3')
        ">3</button>

        <button onclick="
        updateCalculation(' + ')
        ">+</button>

        <button onclick="
        updateCalculation(' - ');
        ">-</button>

        <button onclick="
        calculation = eval(calculation);
        console.log(calculation);
        localStorage.setItem('calculation', calculation);
        outputElement.innerHTML = calculation;
        ">=</button>

        </p>

        <p>
        <button onclick="
        updateCalculation('4')
        ">4</button>

        <button onclick="
        updateCalculation('5')
        ">5</button>

        <button onclick="
        updateCalculation('6')
        ">6</button>

        <button onclick="
        updateCalculation(' * ');
        ">*</button>

        <button onclick="
        updateCalculation(' / ');
        ">/</button>

        <button onclick="
        updateCalculation('.');
        ">.</button>
        </p>

        <p>
        <button onclick="
        updateCalculation('7')
        ">7</button>

        <button onclick="
        updateCalculation('8')
        ">8</button>

        <button onclick="
        updateCalculation('9')
        ">9</button>

        <button onclick="
        updateCalculation('0')
        ">0</button>

        <button onclick="
        calculation = '';
        console.log(calculation);
        localStorage.removeItem('calculation');
        outputElement.innerHTML = calculation;
        ">Reset</button>
        </p>

        <script>

            let calculation = localStorage.getItem('calculation') || '';

            let outputElement = document.querySelector('.output');

            outputElement.innerHTML = calculation;

            function updateCalculation(value) {
                calculation += value;

                console.log(calculation);

                localStorage.setItem('calculation', calculation);

                outputElement.innerHTML = calculation;
            }

            // Optional: you can also create a function in order
            // to reuse this code.
            function saveCalculation() {
                localStorage.setItem('calculation', calculation);
            }

        </script>

    </body>
</html>
