<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8"/>
        <title>Updated Rock Paper Scissor</title>
        <script src ="script.js"></script>
    </head>

    <body>
        <p>Rock Paper Scissors</p>

        <button onclick="playGame('rock')" class="btn-subscribe">Rock</button>

        <button onclick="playGame('paper')" class="btn-subscribe">Paper</button>

        <button onclick="playGame('scissor')" class="btn-subscribe">Scissors</button>

        <p class="text-result">You lose.</p>

        <p>You <span class="playerPick">rock</span> - <span class="computerPick">paper</span> Computer</p>

        <p>Wins: <span class="text-wins">0</span>, Losses: <span class="text-losses">0</span>, Ties: <span class="text-ties">0</span></p>
        <!-- <p>Wins: 6,</p>
        <p>Losses: 4,</p>
        <p>Ties: 3</p> -->

        <button onclick="resetScore()">Reset Score</button>
        <script>
            const resultElement = document.querySelector('.text-result');
            const playerElement = document.querySelector('.playerPick');
            const computerElement = document.querySelector('.computerPick');
            const winsElement = document.querySelector('.text-wins');
            const lossesElement = document.querySelector('.text-losses');
            const tiesElement = document.querySelector('.text-ties');

            let score = JSON.parse(localStorage.getItem('score')) || {
            wins: 0,
            losses: 0,
            ties: 0
            };

            function playGame(playerMove) {
                const computerMove = pickComputerMove();

                let result = '';

                if (playerMove === 'scissor') {
                    if (computerMove === 'rock') {
                        result = 'You lose.';
                    }
                    else if (computerMove === 'paper') {
                        result = 'You win.';
                    }
                    else if (computerMove === 'scissor') {
                        result = 'Tie.';
                    }
                }

                else if (playerMove === 'paper') {
                    if (computerMove === 'rock') {
                        result = 'You win.';
                    }
                    else if (computerMove === 'paper') {
                        result = 'Tie.';
                    }
                    else if (computerMove === 'scissor') {
                        result = 'You lose.';
                    }
                }
                
                else if (playerMove === 'rock') {
                    if (computerMove === 'rock') {
                        result = 'Tie.';
                    }
                    else if (computerMove === 'paper') {
                        result = 'You lose.';
                    }
                    else if (computerMove === 'scissor') {
                        result = 'You win.';
                    }
                }
                
                if (result === 'You win.') {
                    score.wins += 1;
                    resultElement.innerText = 'You win.'
                }
                else if (result === 'You lose.') {
                    score.losses += 1;
                    resultElement.innerText = 'You lose.'
                }
                else {
                    score.ties += 1;
                    resultElement.innerText = "It's a tie."
                }

                playerElement.innerText = playerMove;
                computerElement.innerText = computerMove;

                winsElement.innerText = score.wins;
                lossesElement.innerText = score.losses;
                tiesElement.innerText = score.ties;

                // alert(`You picked ${playerMove}. Computer picked ${computerMove}. ${result}\nWins: ${score.wins} Lose: ${score.losses} Tie: ${score.ties}`);

                localStorage.setItem('score', JSON.stringify(score));
            }

            function pickComputerMove() {
                const randomNumber = Math.random();

                let computerMove = '';

                if (randomNumber >= 0 && randomNumber < 1/3) {
                    computerMove = `rock`;
                }
                else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
                    computerMove = `paper`;
                }
                else if (randomNumber >= 2 / 3 && randomNumber < 1) {
                    computerMove = `scissor`;
                }
                return computerMove;
            }

            function resetScore() {
                score.wins = 0;
                score.losses = 0;
                score.ties = 0;
                localStorage.removeItem('score');

                winsElement.innerText = 0;
                lossesElement.innerText = 0;
                tiesElement.innerText = 0;
            }

            winsElement.innerText = score.wins;
            lossesElement.innerText = score.losses;
            tiesElement.innerText = score.ties;
        </script>
    </body>
</html>
